image: python

stages:
- test
- deploy

before_script:
- pip install tox

pylint:
  image: python:3.11-slim
  stage: test
  script: tox -e pylint

pep8:
  stage: test
  script: tox -e pep8

python311:
  image: python:3.11-slim
  stage: test
  script: tox -e py311

pypy3:
  image: pypy:3-slim
  stage: test
  script: tox -e pypy3

dockerhub:
  image: docker:latest
  stage: deploy
  services:
    - docker:dind
  variables:
    DOCKER_NAMESPACE: coroner
    DOCKER_NAME: ${DOCKER_NAMESPACE}/${CI_PROJECT_NAME}
  before_script:
    - if ! [ -z ${CI_COMMIT_TAG} ] ; then DOCKER_NAME="${DOCKER_NAME}:${CI_COMMIT_TAG}" ; fi
    - echo "[user=${CI_REGISTRY_USER}][reg=${CI_REGISTRY}][tokenlen=${#CI_REGISTRY_PASSWORD}]"
    - echo "${CI_REGISTRY_PASSWORD}" | docker login -u "${CI_REGISTRY_USER}" --password-stdin "${CI_REGISTRY}"
  script:
    - docker build -t "$DOCKER_NAME" .
    - docker push "$DOCKER_NAME"
    - apk add --no-cache curl jq
    - |
      TOKEN=$(curl -s -X POST https://hub.docker.com/v2/users/login -H "Content-Type: application/json" -d "{\"username\":\"${CI_REGISTRY_USER}\",\"password\":\"${CI_REGISTRY_PASSWORD}\"}" | jq -r .token)
    - |
      curl -s -X PATCH "https://hub.docker.com/v2/repositories/${DOCKER_NAMESPACE}/${CI_PROJECT_NAME}/" -H "Authorization: JWT ${TOKEN}" -H "Content-Type: application/json" -d "$(jq -Rs '{description: "D(HE)at attack (CVE-2002-20001) PoC: Diffie-Hellman KEX enforcing DoS against TLS and SSH", full_description: .}' README.md)"
  only:
    refs:
      - branches
      - tags
    variables:
      - $CI_COMMIT_TAG =~ /^v\d+.\d+.\d+$/
      - $CI_COMMIT_REF_NAME == "master"
