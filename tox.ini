[metadata]
description-file = README.md

[tox]
envlist =
    py{311}
    pypy{3}
    pep8
    pylint

[testenv]
extras =
    test
commands =
    coverage erase
    coverage run -m unittest discover -v
    coverage report

[testenv:pep8]
extras =
    pep8
commands =
    flake8 {posargs} dheater test tools/dh_param_priv_key_size_setter

[testenv:pylint]
extras =
    pylint
commands =
    pylint -j0 -rn --rcfile=.pylintrc dheater test tools/dh_param_priv_key_size_setter

[flake8]
max-line-length = 120
